services:
  - type: web
    name: glowup-coach-backend
    runtime: python
    plan: free
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    rootDir: backend
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        sync: false # Set this to your Supabase PostgreSQL URI in the Render dashboard
      - key: JWT_SECRET
        generateValue: true
